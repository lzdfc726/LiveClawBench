# NOTE: This nginx.conf has an intentional error that prevents access logging.
# The agent must find and fix it.

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── INTENTIONAL BUG: access_log set to 'off' ───
    # A previous maintainer disabled access logging during debugging and forgot
    # to re-enable it. Additionally, the custom log_format below has a subtle
    # typo: '$reques' instead of '$request', so even enabling access_log with
    # the 'main' format would produce incomplete log entries.
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$reques" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log off;
    error_log /var/log/nginx/error.log;

    gzip on;

    # HTTPS server
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        # Legacy path kept for reference — do NOT uncomment without re-running the rotation playbook.
        # ssl_certificate /etc/ssl/certs/server.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTP redirect to HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }
}
