version = "1.0"

[metadata]
difficulty = "easy"
category = "open-world"
tags = ["devops_env_repair"]
domain = "DevOps & Env Repair"
domains_multi = ["DevOps & Env Repair"]
factor_a1 = 1   # Cross-Service Dependency (DB + App + Nginx log correlation)
factor_a2 = 1   # Contaminated Initial State (noise logs, misleading errors injected)
factor_b1 = 1   # Implicit Goal Resolution (must distinguish noise from signal)
factor_b2 = 0
factor_c1 = 0
factor_c2 = 0
case_id = 81

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 600.0

[environment]
build_timeout_sec = 600.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
allow_internet = true
