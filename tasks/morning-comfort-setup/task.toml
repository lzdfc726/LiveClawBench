version = "1.0"

[metadata]
difficulty = "medium"
category = "open-world"
tags = ["smart_home", "environmental_diagnosis", "coffee_scheduling"]

domain = "Health & Fitness"
domains_multi = ["Health & Fitness", "E-commerce & Daily Svcs"]

# Triple-Axis Complexity Factors (0 = absent, 1 = present)
factor_a1 = 0   # Cross-Service Dependency (single mock service)
factor_a2 = 1   # Contaminated Initial State (humidity sensor malfunction caused thermostat corruption)
factor_b1 = 1   # Implicit Goal Resolution (agent must infer constraints from context)
factor_b2 = 0   # Knowledge System Maintenance

case_id = 45

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 900.0

[environment]
build_timeout_sec = 300.0
cpus = 2
memory_mb = 4096
storage_mb = 5120
allow_internet = true
